name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      G4_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traverse_g4

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: traverse_g4
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d traverse_g4"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification gate
        run: pnpm verify

      - name: Audit dependencies
        run: pnpm audit:dependencies

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Initialize NonProd Terraform without backend
        run: terraform -chdir=infra/environments/nonprod init -backend=false

      - name: Validate NonProd Terraform
        run: terraform -chdir=infra/environments/nonprod validate

      - name: Initialize static hosting module tests
        run: terraform -chdir=infra/modules/static-hosting init -backend=false

      - name: Test guarded static hosting
        run: terraform -chdir=infra/modules/static-hosting test
